<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微信视频号采集诊断</title>
    <style>
      body {
        margin: 0;
        padding: 28px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
        color: #211329;
        background: #faf8fc;
      }
      h1 {
        margin: 0 0 18px;
        font-size: 24px;
      }
      .card {
        margin-bottom: 16px;
        padding: 18px;
        border: 1px solid #e8dff1;
        border-radius: 8px;
        background: #fff;
      }
      .title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
        font-weight: 700;
      }
      .pill {
        padding: 4px 10px;
        border: 1px solid #d8c9e4;
        border-radius: 999px;
        font-size: 13px;
        color: #4a3b58;
        background: #fbf8fe;
      }
      .ok {
        border-color: #b9d6c5;
        color: #195a37;
        background: #f3fbf6;
      }
      .bad {
        border-color: #f3b8b8;
        color: #9b1c1c;
        background: #fff5f5;
      }
      pre {
        overflow: auto;
        max-height: 240px;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-all;
        font-size: 13px;
        line-height: 1.55;
        color: #3d3048;
      }
      button {
        height: 38px;
        padding: 0 16px;
        border: 1px solid #2f1f3a;
        border-radius: 6px;
        color: #fff;
        background: #2f1f3a;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>微信视频号采集诊断</h1>
    <p>这个页面只做定位：确认平台页面能不能访问本机后台包。</p>
    <button id="rerun">重新检测</button>
    <div id="result"></div>

    <script>
      const result = document.getElementById("result");
      const collectorBaseUrl = "http://127.0.0.1:18765";

      function write(name, status, payload) {
        const card = document.createElement("section");
        card.className = "card";
        const state = status === "通过" ? "ok" : status === "失败" ? "bad" : "";
        card.innerHTML = `
          <div class="title">
            <span>${name}</span>
            <span class="pill ${state}">${status}</span>
          </div>
          <pre>${escapeHtml(typeof payload === "string" ? payload : JSON.stringify(payload, null, 2))}</pre>
        `;
        result.appendChild(card);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      async function testPlatformConfig() {
        const response = await fetch("/api/wechat-video/config", { cache: "no-store" });
        return response.json();
      }

      function testJsonp(path) {
        return new Promise((resolve, reject) => {
          const callbackName = `__collectorDiagnose_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          const script = document.createElement("script");
          const url = new URL(`${collectorBaseUrl}${path}`);
          url.searchParams.set("_jsonp", callbackName);
          const timer = setTimeout(() => {
            delete window[callbackName];
            script.remove();
            reject(new Error("JSONP 超时：浏览器没有执行本机后台包返回的脚本"));
          }, 8000);
          window[callbackName] = (payload) => {
            clearTimeout(timer);
            delete window[callbackName];
            script.remove();
            resolve(payload);
          };
          script.onerror = () => {
            clearTimeout(timer);
            delete window[callbackName];
            script.remove();
            reject(new Error("JSONP 加载失败：浏览器没有加载本机后台包脚本"));
          };
          script.src = url.toString();
          document.head.appendChild(script);
        });
      }

      async function testFetch(path) {
        const response = await fetch(`${collectorBaseUrl}${path}`, { cache: "no-store" });
        return response.json();
      }

      function testBridge() {
        return new Promise((resolve, reject) => {
          const iframe = document.createElement("iframe");
          iframe.style.display = "none";
          iframe.src = `${collectorBaseUrl}/bridge.html?origin=${encodeURIComponent(location.origin)}`;
          const id = `diagnose-${Date.now()}`;
          const timer = setTimeout(() => {
            cleanup();
            reject(new Error("Bridge 超时：本机桥接页没有响应"));
          }, 8000);
          function cleanup() {
            clearTimeout(timer);
            window.removeEventListener("message", onMessage);
            iframe.remove();
          }
          function onMessage(event) {
            const message = event.data || {};
            if (message.source !== "yuebai-collector-bridge") return;
            if (message.ready) {
              iframe.contentWindow.postMessage(
                { source: "yuebai-platform", id, request: { path: "/api/status", options: {} } },
                collectorBaseUrl
              );
              return;
            }
            if (message.id !== id) return;
            cleanup();
            if (message.ok) resolve(message.data);
            else reject(new Error(message.error || "Bridge 请求失败"));
          }
          window.addEventListener("message", onMessage);
          document.body.appendChild(iframe);
        });
      }

      async function run() {
        result.innerHTML = "";
        write("页面环境", "信息", {
          page: location.href,
          origin: location.origin,
          userAgent: navigator.userAgent,
          time: new Date().toLocaleString(),
        });

        for (const item of [
          ["平台配置", () => testPlatformConfig()],
          ["本机后台包 JSONP", () => testJsonp("/api/status")],
          ["本机后台包 fetch", () => testFetch("/api/status")],
          ["本机后台包 bridge", () => testBridge()],
        ]) {
          try {
            const data = await item[1]();
            write(item[0], "通过", data);
          } catch (error) {
            write(item[0], "失败", error && error.stack ? error.stack : String(error));
          }
        }
      }

      document.getElementById("rerun").addEventListener("click", run);
      run();
    </script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>悦拜 RAGFlow 工作台</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
        background: #f8fafc;
        color: #344054;
      }

      body {
        overflow: hidden;
      }

      .shell {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        background: #f5f7fa;
      }

      .topbar {
        height: 52px;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 18px;
        border-bottom: 1px solid #e4e7ec;
        background: #fff;
      }

      .tabs {
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .tab {
        height: 34px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 13px;
        background: transparent;
        color: #475467;
        font-size: 14px;
        cursor: pointer;
      }

      .tab:hover {
        color: #5b21b6;
        background: #f5f3ff;
      }

      .tab.active {
        border-color: #c4b5fd;
        background: #ede9fe;
        color: #5b21b6;
        font-weight: 600;
      }

      .frames {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
      }

      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
        display: none;
      }

      iframe.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="tabs">
          <button class="tab active" data-tab="ragflow">RAGFlow 问答</button>
          <button class="tab" data-tab="governance">知识矫正审核</button>
        </div>
      </div>
      <div class="frames">
        <iframe
          class="active"
          id="ragflowFrame"
          src="/ragflow-native-login-bridge.html"
          title="RAGFlow 问答"
        ></iframe>
        <iframe
          id="governanceFrame"
          src="/?embed=knowledge-governance"
          title="知识矫正审核"
        ></iframe>
      </div>
    </div>
    <script>
      const tabs = document.querySelectorAll(".tab");
      const frames = {
        ragflow: document.getElementById("ragflowFrame"),
        governance: document.getElementById("governanceFrame"),
      };
      const params = new URLSearchParams(window.location.search);
      const storageKey = "yuebai-knowledge-workbench-tab";

      function activate(tabName) {
        tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.tab === tabName));
        Object.entries(frames).forEach(([name, frame]) => {
          frame.classList.toggle("active", name === tabName);
        });
        localStorage.setItem(storageKey, tabName);
      }

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => activate(tab.dataset.tab));
      });

      const initialTab = params.get("tab") || localStorage.getItem(storageKey) || "ragflow";
      activate(initialTab === "governance" ? "governance" : "ragflow");
    </script>
  </body>
</html>
